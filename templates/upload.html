<!DOCTYPE html>
<html>
<head>
    <title>Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand">🚗 Smart Parking AI</span>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        <a href="/dashboard" class="btn btn-outline-warning btn-sm">Dashboard</a>
        <a href="/upload" class="btn btn-outline-info btn-sm">Upload</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="card p-4 shadow-lg text-dark">
    <h4>📸 Upload Vehicle Image</h4>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" class="form-control mb-3" required>
        <button class="btn btn-primary w-100">Detect Plate</button>
    </form>

    {% if image %}
        <img src="/uploads/{{ image }}" class="img-fluid mt-3 rounded">
        <h5 class="mt-2">Detected: {{ plate }}</h5>
    {% endif %}
</div>

    <div class="mt-3">
        <a href="/" class="btn btn-light">Back</a>
    </div>

</div>
<footer class="text-center mt-5 text-secondary">
    <p>© 2026 Smart Parking AI | Built with Flask 🚀</p>
</footer>

</body>
</html>
